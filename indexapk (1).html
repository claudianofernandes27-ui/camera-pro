<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ProCam - Estilo GCam</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Viewfinder (Janela da Câmera) */
        .camera-container {
            position: relative;
            width: 100%;
            height: 70vh;
            background-color: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #viewfinder {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        /* Camadas de Filtro e Efeitos */
        .filter-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            mix-blend-mode: normal;
        }

        /* Interface Superior (Painel de Controle Rápido) */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
            z-index: 10;
        }

        .mode-badge {
            background: rgba(0, 0, 0, 0.5);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* Indicador de Time-Lapse */
        .timelapse-status {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(234, 67, 53, 0.85);
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 13px;
            display: none;
            align-items: center;
            gap: 8px;
            z-index: 10;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        /* Controles de Zoom (Estilo Pixel/GCam) */
        .zoom-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            background: rgba(0, 0, 0, 0.5);
            padding: 4px;
            border-radius: 30px;
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        .zoom-btn {
            background: none;
            border: none;
            color: #aaa;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .zoom-btn.active {
            background: #fff;
            color: #000;
            transform: scale(1.1);
        }

        /* Painel Inferior de Controles Avançados */
        .control-panel {
            background-color: #000;
            height: 30vh;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            padding: 10px 20px;
        }

        /* Sliders de Ajuste Manual e Intensidade */
        .sliders-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }

        .slider-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
            color: #ccc;
        }

        .slider-wrapper span { width: 80px; }
        .slider-wrapper label { width: 35px; text-align: right; }

        .custom-slider {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 4px;
            background: #333;
            border-radius: 2px;
            outline: none;
        }

        .custom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
        }

        /* Seletor de Modos e Filtros (Scroller Horizontal) */
        .scroll-selector {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding: 5px 0;
            scrollbar-width: none;
        }
        .scroll-selector::-webkit-scrollbar { display: none; }

        .selector-item {
            font-size: 13px;
            font-weight: 600;
            color: #777;
            white-space: nowrap;
            cursor: pointer;
            transition: color 0.2s;
        }

        .selector-item.active {
            color: #fbbc04; /* Amarelo característico da GCam */
        }

        /* Barra de Disparo Principal */
        .shutter-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 0 30px;
        }

        .preset-label-btn {
            background: #222;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 11px;
            cursor: pointer;
            border: 1px dashed #55px;
            color: #ccc;
        }

        .shutter-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background-color: #fff;
            border: 5px solid #000;
            box-shadow: 0 0 0 4px #fff;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.3s;
        }

        .shutter-btn:active {
            transform: scale(0.92);
        }

        .shutter-btn.recording {
            background-color: #ea4335;
            border-radius: 10px;
            transform: scale(0.85);
        }

        .gallery-preview {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background-color: #222;
            border: 2px solid #fff;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gallery-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <!-- Painel de Visualização (Câmera) -->
    <div class="camera-container">
        <div class="top-bar">
            <div class="mode-badge" id="current-mode-display">AUTO / 1X</div>
            <input type="file" id="preset-file" accept=".json" style="display: none;">
            <label for="preset-file" class="preset-label-btn">Importar .JSON</label>
        </div>

        <!-- Indicador de gravação do Time-lapse -->
        <div class="timelapse-status" id="timelapse-status">
            <span>🔴 REC TIMELAPSE</span>
            <span id="frame-counter">Frames: 0</span>
        </div>

        <video id="viewfinder" autoplay playsinline></video>
        <div class="filter-overlay" id="filter-layer"></div>

        <!-- Botões de Zoom Rápidos -->
        <div class="zoom-container">
            <button class="zoom-btn active" onclick="setZoom(1, this)">1X</button>
            <button class="zoom-btn" onclick="setZoom(3, this)">3X</button>
            <button class="zoom-btn" onclick="setZoom(5, this)">5X</button>
            <button class="zoom-btn" onclick="setZoom(10, this)">10X</button>
        </div>
    </div>

    <!-- Painel de Controle Inferior -->
    <div class="control-panel">
        
        <!-- Sliders de Controle Avançado -->
        <div class="sliders-container">
            <!-- Intensidade do Filtro -->
            <div class="slider-wrapper">
                <span>Opacidade Filtro</span>
                <input type="range" id="filter-intensity" class="custom-slider" min="0" max="100" value="100">
                <label id="intensity-val">100%</label>
            </div>
            <!-- Intervalo do Time-Lapse -->
            <div class="slider-wrapper" id="tl-interval-wrapper" style="display: none;">
                <span>Intervalo (s)</span>
                <input type="range" id="tl-interval" class="custom-slider" min="0.5" max="5" step="0.5" value="1">
                <label id="interval-val">1.0s</label>
            </div>
        </div>

        <!-- Carrossel de Filtros Profissionais -->
        <div class="scroll-selector" id="filter-selector">
            <div class="selector-item active" data-filter="none">Normal</div>
            <div class="selector-item" data-filter="vivid">Vivid</div>
            <div class="selector-item" data-filter="cinema">Cinema</div>
            <div class="selector-item" data-filter="noir">Noir</div>
            <div class="selector-item" data-filter="vintage">Vintage</div>
            <div class="selector-item" data-filter="fade">Fade</div>
            <div class="selector-item" data-filter="chrome">Chrome</div>
            <div class="selector-item" data-filter="custom" id="custom-filter-opt" style="display:none;">Preset Custom</div>
        </div>

        <!-- Carrossel de Modos Principais -->
        <div class="scroll-selector" id="mode-selector">
            <div class="selector-item active" data-mode="auto">AUTOMÁTICO</div>
            <div class="selector-item" data-mode="manual">MANUAL (PRO)</div>
            <div class="selector-item" data-mode="timelapse">TIME-LAPSE</div>
        </div>

        <!-- Botão de Disparo e Galeria -->
        <div class="shutter-row">
            <div style="width: 45px;"></div> <!-- Espaçador esquerdo -->
            <button class="shutter-btn" id="shutter-trigger"></button>
            <div class="gallery-preview" id="gallery-btn">
                <span style="font-size: 10px; color: #666;">Mídia</span>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('viewfinder');
        const shutterBtn = document.getElementById('shutter-trigger');
        const filterIntensity = document.getElementById('filter-intensity');
        const intensityVal = document.getElementById('intensity-val');
        const tlInterval = document.getElementById('tl-interval');
        const intervalVal = document.getElementById('interval-val');
        const tlIntervalWrapper = document.getElementById('tl-interval-wrapper');
        const timelapseStatus = document.getElementById('timelapse-status');
        const frameCounter = document.getElementById('frame-counter');
        const modeDisplay = document.getElementById('current-mode-display');
        const presetFileInput = document.getElementById('preset-file');

        let currentZoom = 1;
        let currentMode = 'auto'; // auto, manual, timelapse
        let currentFilter = 'none';
        let customPresetData = null;

        // Configurações de Estado do Time-lapse
        let isRecordingTimelapse = false;
        let timelapseTimer = null;
        let frameCount = 0;
        let capturedFrames = [];

        // Definição dos Filtros Profissionais via CSS (Simulado no Viewfinder)
        const filterStyles = {
            none: "none",
            vivid: "saturate(1.8) contrast(1.1)",
            cinema: "contrast(1.3) brightness(0.9) hue-rotate(-10deg)",
            noir: "grayscale(1) contrast(1.6) brightness(0.9)",
            vintage: "sepia(0.5) contrast(0.95) saturate(1.2)",
            fade: "brightness(1.05) contrast(0.85) saturate(0.9)",
            chrome: "saturate(1.4) contrast(1.15) brightness(1)"
        };

        // 1. Inicializar Câmera Traseira
        async function initCamera() {
            try {
                const constraints = {
                    video: {
                        facingMode: { ideal: "environment" },
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    },
                    audio: false
                };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
            } catch (err) {
                console.error("Erro ao acessar a câmera: ", err);
                alert("Por favor, permita o acesso à câmera ou use HTTPS.");
            }
        }

        // 2. Controle de Zoom (Simulação por transform/crop digital)
        function setZoom(scale, buttonElement) {
            currentZoom = scale;
            video.style.transform = `scale(${scale})`;
            
            // Atualizar botões de zoom da interface
            document.querySelectorAll('.zoom-btn').forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');
            updateModeDisplay();
        }

        // 3. Gerenciamento de Modos de Captura
        document.getElementById('mode-selector').addEventListener('click', (e) => {
            if(!e.target.classList.contains('selector-item')) return;
            
            document.querySelectorAll('#mode-selector .selector-item').forEach(item => item.classList.remove('active'));
            e.target.classList.add('active');
            
            currentMode = e.target.dataset.mode;
            
            // Mostrar/Ocultar controles específicos baseados no modo
            if(currentMode === 'timelapse') {
                tlIntervalWrapper.style.display = 'flex';
            } else {
                tlIntervalWrapper.style.display = 'none';
                stopTimelapse();
            }
            updateModeDisplay();
        });

        function updateModeDisplay() {
            modeDisplay.innerText = `${currentMode.toUpperCase()} / ${currentZoom}X`;
        }

        // 4. Aplicação e Intensidade dos Filtros Ao Vivo
        document.getElementById('filter-selector').addEventListener('click', (e) => {
            if(!e.target.classList.contains('selector-item')) return;
            
            document.querySelectorAll('#filter-selector .selector-item').forEach(item => item.classList.remove('active'));
            e.target.classList.add('active');
            
            currentFilter = e.target.dataset.filter;
            applyFilterSettings();
        });

        filterIntensity.addEventListener('input', (e) => {
            intensityVal.innerText = `${e.target.value}%`;
            applyFilterSettings();
        });

        tlInterval.addEventListener('input', (e) => {
            intervalVal.innerText = `${parseFloat(e.target.value).toFixed(1)}s`;
        });

        function applyFilterSettings() {
            const intensity = filterIntensity.value / 100;
            if (currentFilter === 'custom' && customPresetData) {
                // Se for filtro customizado do JSON, mistura as propriedades dinamicamente
                video.style.filter = `
                    saturate(${1 + (customPresetData.saturate - 1) * intensity}) 
                    contrast(${1 + (customPresetData.contrast - 1) * intensity}) 
                    brightness(${1 + (customPresetData.brightness - 1) * intensity})
                `;
            } else {
                // Filtros padrão da lista
                if(currentFilter === 'none') {
                    video.style.filter = 'none';
                } else {
                    // Nota: Para aplicar opacidade ao filtro puro de forma nativa no CSS, 
                    // calculamos uma aproximação linear baseada no valor padrão do filtro vs o slider.
                    video.style.filter = filterStyles[currentFilter];
                    // Para fins de simplificação web, aplicamos opacidade direta ao elemento ou usamos filter interpolate
                    video.style.opacity = 0.3 + (intensity * 0.7); // Mantém o viewfinder visível
                }
            }
        }

        // 5. Upload e Processamento do Arquivo JSON de Preset
        presetFileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(evt) {
                try {
                    const parsed = JSON.parse(evt.target.result);
                    // Exemplo esperado de JSON: {"name": "Lomo Gold", "contrast": 1.4, "saturate": 1.6, "brightness": 0.95}
                    customPresetData = {
                        contrast: parsed.contrast || 1,
                        saturate: parsed.saturate || 1,
                        brightness: parsed.brightness || 1
                    };
                    
                    const customOpt = document.getElementById('custom-filter-opt');
                    customOpt.innerText = parsed.name || "Preset Carregado";
                    customOpt.style.display = "block";
                    customOpt.click(); // Ativa automaticamente o filtro carregado
                } catch(err) {
                    alert("Erro ao ler o arquivo JSON de Preset válido.");
                }
            };
            reader.readAsText(file);
        });

        // 6. Ações do Botão de Disparo (Foto / Gravação Time-Lapse)
        shutterBtn.addEventListener('click', () => {
            if (currentMode === 'timelapse') {
                if (!isRecordingTimelapse) {
                    startTimelapse();
                } else {
                    stopTimelapse();
                }
            } else {
                takePhoto();
            }
        });

        // Captura de Foto Comum
        function takePhoto() {
            // Efeito visual de clique de obturador
            video.style.opacity = '0.3';
            setTimeout(() => video.style.opacity = '1', 150);

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 1280;
            canvas.height = video.videoHeight || 720;
            const ctx = canvas.getContext('2d');

            // Aplica os filtros diretamente no canvas para salvar o arquivo final modificado
            ctx.filter = getComputedStyle(video).filter;
            
            // Desenha a imagem aplicando o corte (crop) simulado do zoom atual
            const sw = canvas.width / currentZoom;
            const sh = canvas.height / currentZoom;
            const sx = (canvas.width - sw) / 2;
            const sy = (canvas.height - sh) / 2;

            ctx.drawImage(video, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
            
            const dataUrl = canvas.toDataURL('image/jpeg');
            updateGalleryPreview(dataUrl);
        }

        // Execução do Fluxo de Time-Lapse
        function startTimelapse() {
            isRecordingTimelapse = true;
            shutterBtn.classList.add('recording');
            timelapseStatus.style.display = 'flex';
            frameCount = 0;
            capturedFrames = [];
            frameCounter.innerText = `Frames: ${frameCount}`;

            const intervalMs = parseFloat(tlInterval.value) * 1000;

            timelapseTimer = setInterval(() => {
                frameCount++;
                frameCounter.innerText = `Frames: ${frameCount}`;
                
                // Salva o frame atual em memória
                const canvas = document.createElement('canvas');
                canvas.width = 480; // Resolução menor otimizada para processamento rápido de vídeo em lote na RAM
                canvas.height = 270;
                const ctx = canvas.getContext('2d');
                ctx.filter = getComputedStyle(video).filter;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                capturedFrames.push(canvas.toDataURL('image/jpeg'));
            }, intervalMs);
        }

        function stopTimelapse() {
            if (!isRecordingTimelapse) return;
            isRecordingTimelapse = false;
            shutterBtn.classList.remove('recording');
            timelapseStatus.style.display = 'none';
            clearInterval(timelapseTimer);

            if(capturedFrames.length > 0) {
                // Atualiza a galeria com o último frame do time-lapse capturado
                updateGalleryPreview(capturedFrames[capturedFrames.length - 1]);
                alert(`Time-lapse concluído! ${frameCount} frames guardados na sessão.`);
            }
        }

        function updateGalleryPreview(src) {
            const gallery = document.getElementById('gallery-btn');
            gallery.innerHTML = `<img src="${src}" alt="Preview">`;
        }

        // Inicializar aplicação ao carregar página
        window.addEventListener('DOMContentLoaded', initCamera);
    </script>
</body>
</html>
